<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice.upscale — www.alice.upscale.com</title>
<meta name="description" content="AI-powered video & photo upscaling. Premium quality. Invite-only.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080d;--surface:#0c0f18;--panel:#10141f;--card:#141a28;
  --border:#1a2235;--border2:#233050;--border3:#2d3f66;
  --accent:#5b8fff;--accent2:#9b6dff;--accentg:linear-gradient(135deg,#5b8fff,#9b6dff);
  --accentgr:linear-gradient(90deg,#5b8fff,#9b6dff);
  --gold:#f0b429;--text:#e4eaf8;--muted:#64748b;--dim:#2d3d5a;
  --danger:#f04f55;--success:#22d87a;--warn:#f0b429;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* ── ambient glow ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% -5%,rgba(91,143,255,.10) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 90% 100%,rgba(155,109,255,.09) 0%,transparent 50%),
    radial-gradient(ellipse 40% 35% at 55% 50%,rgba(91,143,255,.04) 0%,transparent 65%);
}

/* ── views ── */
.view{display:none;position:relative;z-index:1}
.view.active{display:block}
#gate.active{display:flex}

/* ════════════════════════════════════════
   PREMIUM GATE / LOGIN
════════════════════════════════════════ */
#gate{
  min-height:100vh;align-items:center;justify-content:center;
  flex-direction:column;padding:40px 20px;
  background:
    radial-gradient(ellipse 120% 70% at 50% -10%,rgba(91,143,255,.12) 0%,transparent 55%);
}

/* animated stars */
#gate::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 70%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 85%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 60%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 95% 50%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 95%,rgba(255,255,255,.22) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 15%,rgba(255,255,255,.18) 0%,transparent 100%);
}

.gate-brand{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  margin-bottom:40px;position:relative;z-index:2;
}
.gate-logomark{
  width:64px;height:64px;border-radius:18px;
  background:var(--accentg);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 0 40px rgba(91,143,255,.45),0 0 80px rgba(155,109,255,.2);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 40px rgba(91,143,255,.4),0 0 80px rgba(155,109,255,.15)}
  50%{box-shadow:0 0 55px rgba(91,143,255,.65),0 0 110px rgba(155,109,255,.3)}
}
.gate-wordmark{
  font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.02em;
  background:var(--accentg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.gate-tagline{font-size:13px;color:var(--muted);letter-spacing:.02em}
.gate-url{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  background:rgba(91,143,255,.08);border:1px solid rgba(91,143,255,.2);
  border-radius:20px;padding:4px 16px;margin-top:2px;letter-spacing:.04em;
}

.gate-card{
  width:100%;max-width:400px;
  background:rgba(12,15,24,.85);
  border:1px solid rgba(91,143,255,.2);
  border-radius:24px;padding:36px;position:relative;overflow:hidden;
  backdrop-filter:blur(24px);
  box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset,inset 0 1px 0 rgba(255,255,255,.07);
  z-index:2;
}
.gate-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accentgr);
}
/* subtle shimmer on card */
.gate-card::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.025),transparent);
  animation:shimmer 5s ease-in-out infinite;pointer-events:none;
}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

.gate-tabs{
  display:flex;gap:3px;background:rgba(16,20,31,.8);
  border:1px solid var(--border2);border-radius:12px;padding:4px;margin-bottom:26px;
}
.gate-tab{
  flex:1;padding:9px;text-align:center;border-radius:9px;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);
  transition:all .2s;border:none;background:none;font-family:'Inter',sans-serif;
}
.gate-tab.active{
  background:rgba(91,143,255,.15);color:var(--text);
  border:1px solid rgba(91,143,255,.3);
  box-shadow:0 2px 10px rgba(91,143,255,.15);
}

.gate-form{display:none;flex-direction:column;gap:14px}
.gate-form.active{display:flex}

.field-label{
  font-size:11px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px;
}
.field-group{display:flex;flex-direction:column}

.input-wrap{position:relative}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:15px;opacity:.45;pointer-events:none;
}
input[type=text],input[type=password],input[type=email],textarea{
  background:rgba(16,20,31,.9);border:1px solid var(--border2);border-radius:10px;
  padding:11px 14px 11px 38px;color:var(--text);font-family:'Inter',sans-serif;
  font-size:14px;outline:none;transition:all .2s;width:100%;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.3);
}
input:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.3),0 0 0 3px rgba(91,143,255,.12);
}
textarea{resize:vertical;min-height:80px;padding-left:14px}
.no-icon input{padding-left:14px}

/* remember me */
.remember-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.remember-row input[type=checkbox]{
  width:15px;height:15px;padding:0;background:var(--panel);
  border:1px solid var(--border2);border-radius:4px;cursor:pointer;accent-color:var(--accent);
}
.remember-row span{font-size:12px;color:var(--muted)}

.btn{
  padding:12px 20px;border-radius:10px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{
  background:var(--accentg);color:#fff;
  box-shadow:0 4px 20px rgba(91,143,255,.4);
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 6px 28px rgba(91,143,255,.55)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-success{background:var(--success);color:#000;font-weight:700}
.btn-danger-soft{background:rgba(240,79,85,.1);color:var(--danger);border:1px solid rgba(240,79,85,.28)}

.gate-msg{font-size:12px;padding:10px 14px;border-radius:9px;display:none;line-height:1.55}
.gate-msg.err{background:rgba(240,79,85,.1);border:1px solid rgba(240,79,85,.3);color:var(--danger);display:block}
.gate-msg.ok{background:rgba(34,216,122,.07);border:1px solid rgba(34,216,122,.22);color:var(--success);display:block}

.gate-footer{
  margin-top:18px;text-align:center;
  font-size:11px;color:var(--dim);line-height:1.6;
}
.gate-footer a{color:var(--muted);text-decoration:none}
.gate-footer a:hover{color:var(--accent)}

.notice{
  background:rgba(91,143,255,.07);border:1px solid rgba(91,143,255,.18);
  border-radius:9px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.6;
}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;
  background:rgba(10,13,20,.92);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:300;
  backdrop-filter:blur(16px);
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.01em}
.topbar-wordmark span{background:var(--accentg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-left:4px;letter-spacing:.03em}
.badge-owner{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:600;
  background:rgba(240,180,41,.14);color:var(--gold);
  border:1px solid rgba(240,180,41,.28);border-radius:4px;padding:2px 8px;letter-spacing:.1em;
}
.topbar-nav{display:flex;gap:4px;align-items:center}
.tnav-btn{
  padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;
  color:var(--muted);cursor:pointer;background:none;border:none;transition:all .15s;font-family:'Inter',sans-serif;
}
.tnav-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.tnav-btn.active{background:rgba(91,143,255,.1);color:var(--accent)}
.topbar-right{display:flex;gap:8px;align-items:center}

/* ════════════════════════════════════════
   ADMIN LAYOUT
════════════════════════════════════════ */
#admin{min-height:100vh}
.admin-layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 56px)}

.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0}
.sidebar-section{padding:0 12px;margin-bottom:4px}
.sidebar-label{
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);padding:0 10px;margin-bottom:5px;margin-top:16px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;
  border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .14s;
}
.nav-item:hover{background:var(--panel);color:var(--text)}
.nav-item.active{background:rgba(91,143,255,.1);color:var(--accent)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;border-radius:10px;
  padding:1px 6px;min-width:18px;text-align:center;display:none;
}

.main-content{padding:26px;overflow-y:auto}
.panel{display:none}.panel.active{display:block}
.page-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;margin-bottom:5px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}

/* stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.sv-gold{color:var(--gold)}.sv-green{color:var(--success)}.sv-red{color:var(--danger)}

/* card / table */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:11px 18px;border-bottom:1px solid var(--border)}
td{padding:13px 18px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px}
.pill-pending{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.28)}
.pill-approved{background:rgba(34,216,122,.09);color:var(--success);border:1px solid rgba(34,216,122,.25)}
.pill-denied{background:rgba(240,79,85,.09);color:var(--danger);border:1px solid rgba(240,79,85,.25)}
.pill-revoked{background:rgba(100,116,139,.09);color:var(--muted);border:1px solid rgba(100,116,139,.2)}
.act-btns{display:flex;gap:6px}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px;cursor:pointer;font-weight:600;transition:all .14s;border:none}
.bsm-approve{background:rgba(34,216,122,.1);color:var(--success);border:1px solid rgba(34,216,122,.28)}
.bsm-deny{background:rgba(240,79,85,.08);color:var(--danger);border:1px solid rgba(240,79,85,.25)}
.bsm-revoke{background:rgba(100,116,139,.08);color:var(--muted);border:1px solid rgba(100,116,139,.2)}

/* ════════════════════════════════════════
   UPSCALER
════════════════════════════════════════ */
.upscaler-wrap{display:flex;flex-direction:column;gap:18px}

/* drop zone */
.drop-zone{
  border:2px dashed var(--border2);border-radius:18px;
  background:linear-gradient(135deg,rgba(14,19,32,.8),rgba(10,13,22,.9));
  position:relative;overflow:hidden;cursor:pointer;transition:all .25s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  min-height:280px;
}
.drop-zone:hover{border-color:var(--accent);background:rgba(91,143,255,.04)}
.drop-zone.drag-over{border-color:var(--accent);border-style:solid;background:rgba(91,143,255,.07)}
.drop-zone.has-file{border-style:solid;border-color:var(--border);cursor:default;min-height:340px}
.dz-icon{font-size:44px;opacity:.3;pointer-events:none}
.dz-text{font-size:15px;color:var(--muted);font-weight:500;pointer-events:none}
.dz-sub{font-size:12px;color:var(--dim);pointer-events:none}
.dz-browse-btn{
  margin-top:4px;font-size:12px;font-weight:600;color:var(--accent);
  background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.25);
  border-radius:8px;padding:7px 20px;cursor:pointer;transition:all .15s;pointer-events:none;
}
.dz-media{display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}

/* file info bar */
.file-bar{
  display:none;position:absolute;bottom:0;left:0;right:0;
  padding:10px 14px;
  background:linear-gradient(0deg,rgba(6,8,13,.95) 0%,rgba(6,8,13,.7) 100%);
  border-top:1px solid var(--border);
  align-items:center;justify-content:space-between;gap:10px;
}
.file-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.file-change{
  font-size:11px;font-weight:600;color:var(--accent);
  background:rgba(91,143,255,.1);border:1px solid rgba(91,143,255,.25);
  border-radius:6px;padding:4px 12px;cursor:pointer;border:1px solid rgba(91,143,255,.3);
  transition:all .15s;background:none;font-family:'Inter',sans-serif;
}
.file-change:hover{background:rgba(91,143,255,.15)}

/* controls grid */
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.controls-grid{grid-template-columns:1fr}}

.ctrl-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px;
}
.ctrl-title{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);
  margin-bottom:2px;display:flex;align-items:center;gap:7px;
}
.ctrl-title span{font-size:16px}

/* option buttons */
.opt-row{display:flex;flex-wrap:wrap;gap:7px}
.opt-btn{
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--panel);color:var(--muted);
  transition:all .16s;font-family:'DM Mono',monospace;white-space:nowrap;
}
.opt-btn:hover{border-color:var(--accent);color:var(--text)}
.opt-btn.active{
  background:rgba(91,143,255,.15);color:var(--accent);border-color:var(--accent);
  box-shadow:0 0 12px rgba(91,143,255,.18);
}
.opt-btn.active-purple{
  background:rgba(155,109,255,.15);color:#b78fff;border-color:#9b6dff;
  box-shadow:0 0 12px rgba(155,109,255,.18);
}

/* quality tiers */
.quality-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.q-btn{
  padding:10px 4px;border-radius:9px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid var(--border2);background:var(--panel);color:var(--muted);
  transition:all .16s;text-align:center;font-family:'Inter',sans-serif;display:flex;flex-direction:column;gap:3px;
}
.q-btn .q-label{font-size:11px;font-weight:700}
.q-btn .q-sub{font-size:9px;font-weight:400;opacity:.6}
.q-btn:hover{border-color:var(--accent);color:var(--text)}
.q-btn.active{background:rgba(91,143,255,.15);color:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(91,143,255,.2)}
.q-btn.q-insane.active{background:rgba(155,109,255,.15);color:#b78fff;border-color:#9b6dff;box-shadow:0 0 14px rgba(155,109,255,.25)}

/* sharpening */
.sharp-row{display:flex;gap:7px;flex-wrap:wrap}
.sharp-btn{
  padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--panel);color:var(--muted);
  transition:all .16s;font-family:'Inter',sans-serif;
}
.sharp-btn:hover{border-color:var(--accent);color:var(--text)}
.sharp-btn.active{background:rgba(34,216,122,.1);color:var(--success);border-color:rgba(34,216,122,.4);box-shadow:0 0 10px rgba(34,216,122,.12)}

/* live progress */
.live-progress{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:20px;display:none;flex-direction:column;gap:12px;
}
.live-progress.show{display:flex}
.lp-header{display:flex;align-items:center;justify-content:space-between}
.lp-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.lp-spinner{
  width:16px;height:16px;border:2px solid rgba(91,143,255,.2);
  border-top:2px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lp-pct{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent)}

.bar-bg{background:var(--panel);border-radius:6px;height:8px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{
  height:100%;border-radius:6px;
  background:var(--accentgr);
  width:0%;transition:width .25s ease;
  box-shadow:0 0 10px rgba(91,143,255,.5);
  position:relative;overflow:hidden;
}
.bar-fill::after{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:barshine 1.5s ease-in-out infinite;
}
@keyframes barshine{0%{left:-100%}100%{left:200%}}

.lp-stage{font-size:12px;color:var(--text);font-weight:500}
.lp-substage{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

/* server steps */
.server-steps{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.step-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);transition:all .3s}
.step-row.done{color:var(--success)}
.step-row.active-step{color:var(--text)}
.step-dot{
  width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s;
}
.step-row.done .step-dot{background:var(--success)}
.step-row.active-step .step-dot{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:dotpulse 1s ease-in-out infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.4}}

/* result */
.result-card{
  background:rgba(34,216,122,.05);border:1px solid rgba(34,216,122,.25);
  border-radius:14px;padding:20px;display:none;flex-direction:column;gap:14px;
}
